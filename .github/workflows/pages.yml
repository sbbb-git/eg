name: pages (déploiement du dashboard)

# Déploie le site statique (index.html + dashboards + *_data.json) sur GitHub
# Pages. PRÉREQUIS UNIQUE (manuel, 1 fois) : Settings > Pages > Build and
# deployment > Source = "GitHub Actions".
# Ne se déclenche QUE sur main (branche par défaut) ou manuellement, pour ne
# pas échouer en boucle sur la branche de dev tant que Pages n'est pas activé.
# 1) Settings > Pages > Source = GitHub Actions  2) merge sur main (ou dispatch).
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
