name: pages (déploiement du dashboard)

# Déploie le site statique (index.html + dashboards + *_data.json) sur GitHub
# Pages. PRÉREQUIS UNIQUE (manuel, 1 fois) : Settings > Pages > Build and
# deployment > Source = "GitHub Actions".
on:
  push:
    branches: ["claude/escape-init-fkcfrk", "main"]
    paths:
      - "*.html"
      - "*_data.json"
      - "escape_idf_directory.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
