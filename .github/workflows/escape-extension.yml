name: escape-extension (discover + scrape)

# Discovery + scrape toutes les 30 min. Le store brut escape_data/ est
# conservé entre runs via actions/cache (pas commité — voir .gitignore) ;
# seul l'agrégat est régénéré et commité par escape-aggregate.yml.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      seed:
        description: "Régénérer un historique de démo (offline)"
        type: boolean
        default: false

concurrency:
  group: escape-extension
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore raw store cache
        uses: actions/cache@v4
        with:
          path: escape_data
          key: escape-data-${{ github.run_id }}
          restore-keys: |
            escape-data-

      - name: Discovery (résout les plateformes encore unknown)
        run: python3 escape_extension_discover.py --only-unknown
        continue-on-error: true

      - name: Scrape dispo — source PRIMAIRE 4escape (léger, /30 min)
        # Uniquement la dispo (upcoming) : c'est le coeur haute-fréquence.
        # Catalogue/enrich/prix sont rafraîchis par escape-daily.yml (lent).
        # Si le catalogue manque (1er run), on le construit d'abord.
        run: |
          test -f escape_4escape_catalog.json || python3 escape_4escape.py --harvest --enrich
          python3 escape_4escape.py --scrape
        continue-on-error: true

      - name: Scrape — sources par-site (catalogue étendu, si --seed)
        if: ${{ inputs.seed }}
        run: python3 escape_extension_scrape.py --seed
        continue-on-error: true

      - name: Aggregate (vues réelles)
        run: |
          python3 escape_live_compute.py || true
          python3 escape_4escape_compute.py || true
          python3 sanity_check.py || true
          # NB : escape_idf_data.json (maquette démo) n'est PAS régénéré en CI
          # (il faudrait --seed). Il reste tel quel, versionné.

      - name: Commit aggregates + catalogues
        run: |
          git config user.name "escape-bot"
          git config user.email "bot@users.noreply.github.com"
          git add escape_live_data.json escape_4escape_live.json escape_4escape_catalog.json \
                  escape_extension_resolved.json escape_sanity.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: scrape run ${{ github.run_id }}"
          for i in 1 2 3 4; do git push && break || sleep $((2**i)); done
